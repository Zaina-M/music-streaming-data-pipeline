[pytest]
# Test discovery starts at the tests/ folder. Adjust paths if you ever
# add tests outside of it.
testpaths = .

# Filename pattern — pytest's default is fine but pinning it removes
# any future ambiguity.
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Show captured stdout/stderr for failing tests so debugging Glue
# logging-heavy scripts is easier.
addopts = -ra -v

# Markers for grouping slow / external tests. Use:
#   pytest -m "not slow"     # skip Spark tests
#   pytest -m spark          # only Spark tests
markers =
    spark: Tests that require a local PySpark / SparkSession (slow start)
